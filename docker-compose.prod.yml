services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hrm-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    expose:
      - "3000"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: /api/v1
        VITE_USE_MOCK: "false"
    container_name: hrm-frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "80:80"
